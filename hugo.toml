baseURL = "https://camilladsp.com"
title = "CamillaDSP"
locale = "en-us"

enableRobotsTXT = true
enableGitInfo = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup.goldmark.renderer]
  unsafe = true

[params]
  description = "Open source tools for real-time audio processing, room correction, active crossovers, and advanced filtering."

  [params.navbar]
    displayTitle = false
    displayLogo = true
    logo.path = "camilladsp.svg"
    logo.dark = "camilladsp.svg"
    logo.link = "/"
    logo.width = 160
    logo.height = 40

  [params.footer]
    enable = true
    displayCopyright = false
    displayPoweredBy = false

  [params.theme]
    displayToggle = false

  [params.search]
    enable = true

[menu]
  [[menu.main]]
    name = "Documentation"
    pageRef = "/docs"
    weight = 1
  [[menu.main]]
    name = "Examples"
    pageRef = "/examples"
    weight = 2
  [[menu.main]]
    name = "Releases"
    pageRef = "/releases"
    weight = 3
  [[menu.main]]
    name = "News"
    pageRef = "/news"
    weight = 4
  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/HEnquist/camilladsp"
    weight = 5
    [menu.main.params]
      icon = "github"
